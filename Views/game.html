<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/style.css" rel="stylesheet" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <title>The typing game</title>
</head>
<body>
    <div id="root"></div>
    <script>
        const TypingGame = () => {
            const [text, setText] = React.useState("The quick brown fox jumps over the lazy dog. This is a sample text for the typing game.");
            const [input, setInput] = React.useState("");
            const [score, setScore] = React.useState(null);

            const handleInput = (e) => {
                if (score !== null) return; // disable after submit
                let value = e.target.value;

                // Prevent backspace (no going back)
                if (value.length < input.length) {
                    e.target.value = input;
                    return;
                }

                setInput(value);
            };

            const handleSubmit = async () => {
                try {
                    const response = await fetch('/submit', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userInput: input, originalText: text })
                    });
                    const data = await response.json();
                    setScore(data.score);
                } catch (err) {
                    console.error('Submit error:', err);
                    let mistakes = 0;
                    const maxLen = Math.max(text.length, input.length);
                    for (let i = 0; i < maxLen; i++) {
                        if ((input[i] || '') !== (text[i] || '')) mistakes++;
                    }
                    const finalScore = Math.max(0, 100 - mistakes * 5);
                    setScore(finalScore);
                }
            };

            const renderText = () => {
                return text.split('').map((char, index) => {
                    let color = 'gray';
                    if (index < input.length) {
                        color = 'black';
                    }
                    return React.createElement('span', { key: index, style: { color: color, fontWeight: 'bold' } }, char);
                });
            };

            return React.createElement('div', { style: { position: 'relative', padding: '20px' } },
                React.createElement('h1', null, 'Typing Game'),
                React.createElement('div', { style: { fontSize: '28px', lineHeight: '1.8', marginBottom: '20px', position: 'relative', fontFamily: 'Arial, sans-serif', letterSpacing: '1px', backgroundColor: '#f5f5f5', padding: '20px', borderRadius: '5px' } }, ...renderText()),
                input.length >= text.length && score === null ? React.createElement('button', { onClick: handleSubmit, style: { fontSize: '18px', padding: '12px 30px', marginTop: '20px', backgroundColor: '#4CAF50', color: 'white', border: 'none', borderRadius: '5px', cursor: 'pointer' } }, 'Submit') : null,
                score !== null ? React.createElement('div', { style: { fontSize: '24px', marginTop: '20px', fontWeight: 'bold', color: score > 90 ? 'green' : score > 70 ? 'blue' : score > 50 ? 'orange' : 'red' } }, `Your score: ${score}% - ${score > 90 ? 'Perfect!' : score > 70 ? 'Great job!' : score > 50 ? 'Not bad!' : 'Keep trying!'}`) : null,
                React.createElement('input', {
                    type: 'text',
                    value: input,
                    onChange: handleInput,
                    disabled: score !== null,
                    style: {
                        position: 'absolute',
                        top: '112px',
                        left: '40px',
                        width: 'calc(100% - 80px)',
                        height: '27px',
                        background: 'transparent',
                        border: 'none',
                        outline: 'none',
                        color: 'transparent',
                        caretColor: 'black',
                        fontSize: '28px',
                        lineHeight: '1.8',
                        fontFamily: 'Arial, sans-serif',
                        letterSpacing: '1px',
                        padding: '0',
                        margin: '0'
                    },
                    placeholder: ''
                })
            );
        };

        ReactDOM.render(React.createElement(TypingGame), document.getElementById('root'));
    </script>
</body>
</html>
